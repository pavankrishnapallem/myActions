name: output
on:
  push

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.get_version.outputs.version}}

    steps:
      - id: get_version
        run: echo "version=1.0.0" >> $GITHUB_OUTPUT  

  use:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Running on ${{needs.build.outputs.version}}"